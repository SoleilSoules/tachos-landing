name: CI

# Typecheck, lint and build on every PR and on pushes to main. Deployment is a
# separate workflow (deploy.yml) — this one only guards quality, it never ships.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
